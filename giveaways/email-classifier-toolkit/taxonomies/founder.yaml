# Founder taxonomy — for a startup founder wearing every hat.
# Same format as every taxonomy here: a top-level `categories:` list,
# each with a `name` and a `description`. Synthetic, edit freely.

categories:
  - name: investor
    description: >
      Anything from current or prospective investors — update replies, intro
      requests, due-diligence questions, term-sheet follow-ups.

  - name: customer_issue
    description: >
      Existing customers reporting bugs, outages, billing problems, or churn
      risk. Usually time-sensitive and needs a human reply.

  - name: sales_lead
    description: >
      Inbound prospects asking about the product, pricing, demos, or whether
      it's a fit. New revenue, not yet a customer.

  - name: hiring
    description: >
      Candidates, recruiters, and referrals — applications, interview
      scheduling, offer negotiation, talent intros.

  - name: vendor_ops
    description: >
      Tooling, contracts, invoices, and operational admin from vendors and
      service providers.

  - name: personal
    description: >
      Personal or miscellaneous mail that doesn't fit the above and usually
      needs a quick human reply.
