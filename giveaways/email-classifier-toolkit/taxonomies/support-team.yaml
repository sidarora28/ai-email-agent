# Support team taxonomy — for a customer-support shared inbox.
# Same format: a top-level `categories:` list with `name` + `description`.

categories:
  - name: bug_report
    description: >
      Customers reporting something broken — errors, crashes, features not
      working as expected. Needs triage and a fix or workaround.

  - name: how_to
    description: >
      Usage questions — "how do I", configuration help, where-to-find-X.
      Often answerable from docs.

  - name: billing
    description: >
      Invoices, refunds, plan changes, failed payments, and other
      money-related requests.

  - name: account_access
    description: >
      Login problems, password resets, SSO failures, locked accounts, and
      permission requests.

  - name: feature_request
    description: >
      Suggestions and asks for new functionality. Not urgent, but worth
      routing to product.

  - name: escalation
    description: >
      Angry, churn-risk, or legally sensitive messages that need a senior
      human and a fast response.
