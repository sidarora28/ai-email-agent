# Content creator taxonomy — for a newsletter / YouTube / podcast creator.
# Same format: a top-level `categories:` list with `name` + `description`.

categories:
  - name: brand_deal
    description: >
      Sponsorship and brand-partnership offers — companies wanting placements,
      reads, or integrations, plus replies to your media-kit outreach.

  - name: audience_question
    description: >
      Questions and replies from your audience — feedback on content, requests
      for topics, "how do I" asks.

  - name: collab
    description: >
      Other creators proposing collaborations, guest swaps, cross-promos, or
      podcast/interview invites.

  - name: product_sale
    description: >
      People asking about or buying your products — courses, templates,
      memberships, merch.

  - name: press_pr
    description: >
      Journalists, PR firms, and event organizers seeking quotes, interviews,
      or speaking appearances.

  - name: personal
    description: >
      Personal or admin mail that doesn't fit the above and usually needs a
      quick human reply.
